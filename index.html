<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>Missão Ciência AR</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin:0; overflow:hidden;">

<a-scene
embedded
arjs>

<!-- Marcador Hiro -->
<a-marker preset="hiro">

<!-- Objeto DNA -->
<a-entity
geometry="primitive: torusKnot; radius:0.5; radiusTubular:0.15"
material="color:blue"
animation="property:rotation;
to:0 360 0;
loop:true;
dur:3000">

</a-entity>


<!-- Texto da missão -->
<a-text
value="MISSÃO 1\nQual a função do DNA?\nDescubra a pista!"
position="0 1 0"
align="center"
color="yellow">

</a-text>


</a-marker>


<a-entity camera></a-entity>

</a-scene>

</body>
</html>
